<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us | MakeAList</title>

  <link rel="stylesheet" href="style.css">

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "ContactPage",
    "name": "Contact MakeAList",

    "mainEntity": {
      "@type": "Person",
      "name": "Aansa Waqas",

<div id="header-root"></div>

        <p>For all inquiries, please reach out via email:</p>
        <a href="mailto:aansawaqas50@gmail.com" style="color: var(--accent); font-weight: 600; text-decoration: none; font-size: 1.1rem;">
          aansawaqas50@gmail.com
        </a>
      </div>

        <p class="text3" style="font-size: 0.9rem;">Expect a response within 24-48 hours during business days.</p>

<div id="footer-root"></div>

<script src="header.js"></script>
